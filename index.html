/* ── Login ── */
function LoginScreen({ onLogin, lang, setLang }) {
  const [pw,setPw]=useState(""); const [err,setErr]=useState(false); const t=T[lang];
  const submit = e => {
    e.preventDefault();
    if(pw===PASSWORDS.editor) onLogin("editor");
    else if(pw===PASSWORDS.viewer) onLogin("viewer");
    else { setErr(true); setTimeout(()=>setErr(false),2000); }
  };
  return (
    <div className="min-h-screen flex items-center justify-center p-4" style={{background:"linear-gradient(135deg,#6b2155,#4a1040,#3a0d30)"}} dir={t.dir}>
      <div className="absolute top-4 right-4">
        <button onClick={()=>setLang(lang==="ar"?"en":"ar")} className="bg-white/20 hover:bg-white/30 text-white text-sm font-bold px-4 py-2 rounded-full backdrop-blur-sm transition">🌐 {t.switchLang}</button>
      </div>
      <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div className="text-center mb-8">
          <div className="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl" style={{background:"#6b2155"}}>🔗</div>
          <h1 className="text-2xl font-extrabold text-slate-800">{t.loginTitle}</h1>
          <p className="text-slate-500 text-sm mt-2">{t.loginSub}</p>
        </div>
        <form onSubmit={submit} className="space-y-4">
          <div>
            <label className="block text-xs font-bold text-slate-600 mb-1">{t.pwLabel}</label>
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder={t.pwPh} dir="ltr"
              className={`w-full px-4 py-3 border-2 rounded-xl text-sm focus:outline-none transition ${err?"border-red-400 bg-red-50":"border-slate-200 focus:border-theme"}`}/>
            {err && <p className="text-red-500 text-xs mt-1 font-semibold">{t.wrongPw}</p>}
          </div>
          <button type="submit" style={{background:"#6b2155"}} className="w-full hover:opacity-90 text-white font-bold py-3 rounded-xl text-sm transition shadow-md">{t.loginBtn}</button>
        </form>
      </div>
    </div>
  );
}

/* ── Toast ── */
function Toast({ n, onClose }) {
  if(!n) return null;
  const cls={success:"bg-emerald-50 border-emerald-200 text-emerald-800",warning:"bg-amber-50 border-amber-200 text-amber-800",error:"bg-rose-50 border-rose-200 text-rose-800"}[n.type];
  return (
    <div className={`fixed top-4 left-4 right-4 md:left-auto md:w-96 z-50 p-4 rounded-xl shadow-lg border flex items-center gap-3 ${cls}`}>
      <div className="flex-1 text-sm font-semibold">{n.message}</div>
      <button onClick={onClose} className="text-slate-400 hover:text-slate-600 font-bold text-lg leading-none">×</button>
    </div>
  );
}

/* ── Steps Modal ── */
function StepsModal({ filter, onClose, t }) {

    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="bg-white rounded-2xl w-full max-w-xl max-h-[90vh] overflow-y-auto shadow-2xl border border-slate-100" dir={t.dir}>
        <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center sticky top-0 bg-white z-10">
          <div className="flex items-center gap-2">
            <span className="p-2 bg-theme-light text-theme rounded-lg text-lg">📋</span>
            <div>
              <h2 className="text-lg font-bold text-slate-800">{t.stepsModalTitle}</h2>
              <p className="text-xs text-slate-400 line-clamp-1">{filter.title}</p>
            </div>
          </div>
          <button onClick={onClose} className="p-1 rounded-full hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition">
            <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <div className="p-6 space-y-5">
          {filter.stepsImage && <img src={filter.stepsImage} alt="steps" className="w-full rounded-xl border border-slate-200 object-contain max-h-64"/>}
          {filter.steps && filter.steps.length > 0 ? (
            <div className="space-y-3">
              {filter.steps.map((step,i) => (
                <div key={i} className="flex gap-3 items-start">
                  <div className="flex-shrink-0 w-7 h-7 rounded-full bg-theme text-white text-xs font-extrabold flex items-center justify-center mt-0.5">{i+1}</div>
                  <div className="flex-1 bg-slate-50 rounded-xl px-4 py-3 text-sm text-slate-700 leading-relaxed border border-slate-100">{step}</div>
                </div>
              ))}
            </div>
          ) : (
            <div className="text-center py-8 text-slate-400"><div className="text-4xl mb-2">📭</div><p className="text-sm">{t.noSteps}</p></div>

            <span>{t.by}: <strong className="text-slate-600">{filter.createdBy||t.unknown}</strong></span>
            <span>{dateStr}</span>

          <button onClick={()=>onViewSteps(filter)}
            className="w-full bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold py-2.5 px-3 rounded-xl text-xs transition flex items-center justify-center gap-1.5">
            📋 {t.viewSteps}
          </button>

            <a href={filter.crmUrl} target="_blank" rel="noopener noreferrer"
              className="flex-1 btn-light font-bold py-2.5 px-3 rounded-xl text-xs transition flex items-center justify-center gap-1.5">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
              {t.goToFilter}
            </a>
            <button onClick={()=>onCopy(filter.crmUrl)} className="bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-2.5 px-3 rounded-xl text-xs transition flex items-center justify-center gap-1.5">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>

/* ── Filter Form (Add + Edit) ── */
function FilterForm({ onClose, onSave, showNotif, t, existingFilter }) {
  const isEdit = !!existingFilter;
  const [title,setTitle]=useState(existingFilter?.title||"");
  const [category,setCategory]=useState(existingFilter?.category||"contacts");
  const [crmUrl,setCrmUrl]=useState(existingFilter?.crmUrl||"");
  const [desc,setDesc]=useState(existingFilter?.description||"");
  const [steps,setSteps]=useState(existingFilter?.steps?.length ? existingFilter.steps : [""]);
  const [imgType,setImgType]=useState("auto");
  const [imgUrl,setImgUrl]=useState("");
  const [imgPreview,setImgPreview]=useState(existingFilter?.imageUrl||null);
  const [imgBase64,setImgBase64]=useState(null);
  const [stepsImgType,setStepsImgType]=useState("none");
  const [stepsImgUrl,setStepsImgUrl]=useState("");
  const [stepsImgBase64,setStepsImgBase64]=useState(null);
  const [stepsImgPreview,setStepsImgPreview]=useState(existingFilter?.stepsImage||null);
  const [sub,setSub]=useState(false);
  const fileRef=useRef(null);
  const stepsFileRef=useRef(null);

  const handleFileChange = (e, isSteps) => {
    const file = e.target.files[0]; if(!file) return;
    if(file.size > 3*1024*1024) { showNotif("warning", t.lang==="ar"?"الصورة أكبر من 3MB":"Image > 3MB"); return; }
    const reader = new FileReader();
    reader.onload = ev => {
      if(isSteps) { setStepsImgBase64(ev.target.result); setStepsImgPreview(ev.target.result); }
      else { setImgBase64(ev.target.result); setImgPreview(ev.target.result); }
    };
    reader.readAsDataURL(file);
  };

  const addStep = () => setSteps([...steps,""]);
  const removeStep = i => setSteps(steps.filter((_,idx)=>idx!==i));
  const updateStep = (i,val) => { const s=[...steps]; s[i]=val; setSteps(s); };

  const submit = async e => {
    e.preventDefault();
    if(!title.trim()||!crmUrl.trim()||!desc.trim()){showNotif("warning",t.fillAll);return;}
    setSub(true);
    let finalImg = isEdit ? (existingFilter.imageUrl||getAutoImage(title)) : getAutoImage(title);
    if(imgBase64) finalImg = imgBase64;
    else if(imgType==="url" && imgUrl.trim()) finalImg = imgUrl.trim();
    else if(imgType==="auto") finalImg = getAutoImage(title);

    let finalStepsImg = existingFilter?.stepsImage||null;
    if(stepsImgBase64) finalStepsImg = stepsImgBase64;
    else if(stepsImgType==="url" && stepsImgUrl.trim()) finalStepsImg = stepsImgUrl.trim();
    else if(stepsImgType==="none" && !isEdit) finalStepsImg = null;

    await onSave({
      id: isEdit ? existingFilter.id : `f-${Date.now()}`,
      title:title.trim(), crmUrl:crmUrl.trim(), description:desc.trim(), category,
      imageUrl:finalImg, steps:steps.filter(s=>s.trim()), stepsImage:finalStepsImg,
      createdBy: isEdit ? existingFilter.createdBy : t.me,
      createdAt: isEdit ? existingFilter.createdAt : new Date().toISOString(),
    });
    setSub(false); onClose();
  };

  return (
    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl border border-slate-100">
        <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center sticky top-0 bg-white z-10">
          <div className="flex items-center gap-2">
            <span className="p-2 bg-theme-light text-theme rounded-lg text-lg">{isEdit?"✏️":"🔗"}</span>
            <h2 className="text-xl font-bold text-slate-800">{isEdit ? t.editModalTitle : t.modalTitle}</h2>
          </div>
          <button onClick={onClose} className="p-1 rounded-full hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition">
            <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>

        <form onSubmit={submit} className="p-6 space-y-5">
          <div>
            <label className="block text-xs font-bold text-slate-600 mb-1">{t.filterName}</label>
            <input type="text" required value={title} onChange={e=>setTitle(e.target.value)} placeholder={t.filterNamePh}
              className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm ring-theme focus:outline-none"/>
          </div>
          <div>
            <label className="block text-xs font-bold text-slate-600 mb-1">{t.categoryLabel}</label>
            <div className="grid grid-cols-4 gap-2">
              {CATEGORIES.filter(c=>c.id!=="all").map(c=>(
                <button key={c.id} type="button" onClick={()=>setCategory(c.id)}
                  className={`py-2 px-3 rounded-xl border text-xs font-bold transition ${category===c.id?"text-white border-theme bg-theme":"border-slate-200 hover:bg-slate-50 text-slate-600"}`}>
                  {c[t.lang]==="ar"?c.ar:c.en}
                </button>
              ))}
            </div>
          </div>
          <div>
            <label className="block text-xs font-bold text-slate-600 mb-1">{t.filterLink}</label>
            <input type="url" required value={crmUrl} onChange={e=>setCrmUrl(e.target.value)} placeholder="https://app.hubspot.com/..." dir="ltr"
              className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm text-left ring-theme focus:outline-none"/>
          </div>
          <div>
            <label className="block text-xs font-bold text-slate-600 mb-1">{t.detailedDesc}</label>
            <textarea rows="3" required value={desc} onChange={e=>setDesc(e.target.value)} placeholder={t.descPh}
              className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm ring-theme focus:outline-none leading-relaxed"/>
          </div>

          {/* Steps */}
          <div className="border border-blue-100 bg-blue-50/40 rounded-2xl p-4 space-y-3">
            <label className="block text-sm font-bold text-blue-800">📋 {t.stepsTitle}</label>
            {steps.map((step,i) => (
              <div key={i} className="flex gap-2 items-start">
                <div className="flex-shrink-0 w-6 h-6 rounded-full bg-theme text-white text-xs font-bold flex items-center justify-center mt-2.5">{i+1}</div>
                <input type="text" value={step} onChange={e=>updateStep(i,e.target.value)} placeholder={t.stepPh}
                  className="flex-1 px-3 py-2.5 border border-slate-200 rounded-xl text-sm ring-theme focus:outline-none bg-white"/>
                {steps.length > 1 && (
                  <button type="button" onClick={()=>removeStep(i)} className="mt-2 text-red-400 hover:text-red-600 text-xs font-bold px-2 py-1 rounded-lg hover:bg-red-50 transition whitespace-nowrap">{t.removeStep}</button>
                )}
              </div>
            ))}
            <button type="button" onClick={addStep} className="text-blue-600 hover:text-blue-800 text-xs font-bold px-3 py-2 rounded-xl hover:bg-blue-100 transition">{t.addStep}</button>

            {/* Steps image */}
            <div className="border-t border-blue-100 pt-3">
              <label className="block text-xs font-bold text-slate-600 mb-2">{t.stepsImageTitle}</label>
              {stepsImgPreview && isEdit && (
                <div className="mb-2">
                  <img src={stepsImgPreview} alt="current" className="max-h-28 rounded-lg object-contain border border-slate-200"/>
                  <p className="text-[10px] text-slate-400 mt-1">{t.lang==="ar"?"الصورة الحالية":"Current image"}</p>
                </div>
              )}
              <div className="grid grid-cols-3 gap-2 mb-3">
                {[{k:"none",l:"—"},{k:"upload",l:t.imageUpload},{k:"url",l:t.imageUrl}].map(({k,l})=>(
                  <button key={k} type="button" onClick={()=>{setStepsImgType(k);setStepsImgBase64(null);setStepsImgUrl("");}}
                    className={`p-2 rounded-xl border text-xs font-semibold transition text-center ${stepsImgType===k?"border-theme bg-theme-light text-theme":"border-slate-200 hover:bg-slate-50 bg-white"}`}>{l}</button>
                ))}
              </div>
              {stepsImgType==="upload" && (
                <div>
                  <div onClick={()=>stepsFileRef.current?.click()} className="w-full border-2 border-dashed border-slate-200 hover:border-theme rounded-xl p-4 text-center cursor-pointer transition">
                    {stepsImgBase64 ? <img src={stepsImgBase64} className="max-h-32 mx-auto rounded-lg object-contain"/> : <p className="text-sm text-slate-400">{t.chooseFile}</p>}
                  </div>
                  <input ref={stepsFileRef} type="file" accept="image/*" className="hidden" onChange={e=>handleFileChange(e,true)}/>
                </div>
              )}
              {stepsImgType==="url" && (
                <input type="url" value={stepsImgUrl} onChange={e=>setStepsImgUrl(e.target.value)} placeholder="https://example.com/screenshot.png" dir="ltr"
                  className="w-full px-3 py-2 border border-slate-200 rounded-xl text-xs text-left ring-theme focus:outline-none"/>
              )}
            </div>
          </div>

          {/* Card image */}
          <div className="border-t border-slate-100 pt-4">
            <label className="block text-xs font-bold text-slate-700 mb-2">{t.cardImage}</label>
            {isEdit && imgPreview && (
              <div className="mb-2 flex items-center gap-3 bg-slate-50 p-3 rounded-xl border border-slate-100">
                <img src={imgPreview} alt="current" className="w-12 h-12 rounded-lg object-cover"/>
                <p className="text-xs text-slate-500">{t.lang==="ar"?"الصورة الحالية — اختر أدناه للتغيير":"Current image — choose below to change"}</p>
              </div>
            )}
            <div className="grid grid-cols-3 gap-2 mb-3">
              {[{k:"auto",l:t.imageAuto},{k:"upload",l:t.imageUpload},{k:"url",l:t.imageUrl}].map(({k,l})=>(
                <button key={k} type="button" onClick={()=>{setImgType(k);setImgBase64(null);setImgUrl("");}}
                  className={`p-2.5 rounded-xl border text-xs font-semibold transition text-center ${imgType===k?"border-theme bg-theme-light text-theme":"border-slate-200 hover:bg-slate-50"}`}>{l}</button>
              ))}
            </div>
            {imgType==="auto" && (
              <div className="flex items-center gap-3 bg-slate-50 p-3 rounded-xl border border-slate-100">
                <img src={getAutoImage(title||"HubSpot")} alt="auto" className="w-12 h-12 rounded-lg object-cover"/>
                <p className="text-xs text-slate-500">{t.imageAutoMsg}</p>
              </div>
            )}
            {imgType==="upload" && (
              <div>
                <div onClick={()=>fileRef.current?.click()} className="w-full border-2 border-dashed border-slate-200 hover:border-theme rounded-xl p-5 text-center cursor-pointer transition">
                  {imgBase64 ? <img src={imgBase64} className="max-h-36 mx-auto rounded-lg object-cover"/> : <p className="text-sm text-slate-400">{t.chooseFile}</p>}
                </div>
                <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={e=>handleFileChange(e,false)}/>
              </div>
            )}
            {imgType==="url" && (
              <input type="url" value={imgUrl} onChange={e=>setImgUrl(e.target.value)} placeholder="https://example.com/image.jpg" dir="ltr"
                className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-xs text-left ring-theme focus:outline-none"/>
            )}
          </div>

          <div className="flex gap-3 pt-4 border-t border-slate-100">
            <button type="submit" disabled={sub} className="flex-1 btn-primary disabled:bg-slate-300 font-bold py-3 px-4 rounded-xl text-sm transition shadow-md">
              {sub ? t.savingBtn : isEdit ? t.saveEditBtn : t.publishBtn}
            </button>
            <button type="button" onClick={onClose} className="bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 px-5 rounded-xl text-sm transition">{t.cancelBtn}</button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ── Settings Modal (Editor only) ── */
function SettingsModal({ onClose, theme, setTheme, siteSettings, setSiteSettings, showNotif, t }) {
  const [name, setName] = useState(siteSettings.name);
  const [subtitle, setSubtitle] = useState(siteSettings.subtitle);
  const [selTheme, setSelTheme] = useState(theme.id);

  const save = () => {
    const newTheme = THEMES.find(th=>th.id===selTheme) || THEMES[0];
    const newSettings = { name: name.trim()||t.appName, subtitle: subtitle.trim()||t.subtitle };
    setTheme(newTheme);
    setSiteSettings(newSettings);
    try { localStorage.setItem(THEME_KEY, selTheme); localStorage.setItem(SITE_KEY, JSON.stringify(newSettings)); } catch {}
    showNotif("success", t.settingsSaved);
    onClose();
  };

  return (
    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="bg-white rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto shadow-2xl border border-slate-100" dir={t.dir}>
        <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center sticky top-0 bg-white z-10">
          <div className="flex items-center gap-2">
            <span className="text-xl">⚙️</span>
            <h2 className="text-xl font-bold text-slate-800">{t.settingsTitle}</h2>
          </div>
          <button onClick={onClose} className="p-1 rounded-full hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition">
            <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <div className="p-6 space-y-6">
          {/* Site name */}
          <div>
            <label className="block text-xs font-bold text-slate-600 mb-1">{t.siteName}</label>
            <input type="text" value={name} onChange={e=>setName(e.target.value)}
              className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:outline-none" style={{focusRingColor: theme.primary}}/>
          </div>
          {/* Site subtitle */}
          <div>
            <label className="block text-xs font-bold text-slate-600 mb-1">{t.siteSubtitle}</label>
            <textarea rows="2" value={subtitle} onChange={e=>setSubtitle(e.target.value)}
              className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:outline-none leading-relaxed"/>
          </div>
          {/* Color picker */}
          <div>
            <label className="block text-xs font-bold text-slate-600 mb-3">{t.themeColor}</label>
            <div className="grid grid-cols-4 gap-2">
              {THEMES.map(th => (
                <button key={th.id} type="button" onClick={()=>setSelTheme(th.id)}
                  className={`p-3 rounded-xl border-2 text-xs font-bold transition flex flex-col items-center gap-1.5 ${selTheme===th.id?"border-slate-400 shadow-md":"border-slate-100 hover:border-slate-300"}`}>
                  <div className="w-8 h-8 rounded-full shadow-sm" style={{background:th.primary}}></div>
                  <span className="text-slate-600 text-[10px]">{th.label.split(" ")[1]}</span>
                  {selTheme===th.id && <span className="text-[10px] font-extrabold" style={{color:th.primary}}>✓</span>}
                </button>
              ))}
            </div>
          </div>
          {/* Preview */}
          <div className="rounded-xl overflow-hidden border border-slate-200">
            <div style={{background: THEMES.find(th=>th.id===selTheme)?.gradient||THEMES[0].gradient}} className="p-4 text-white">
              <p className="font-extrabold text-lg">{name||t.appName}</p>
              <p className="text-white/80 text-xs mt-1">{subtitle||t.subtitle}</p>
            </div>
          </div>
          <button onClick={save} className="w-full text-white font-bold py-3 rounded-xl text-sm transition shadow-md" style={{background: THEMES.find(th=>th.id===selTheme)?.primary||theme.primary}}>
            {t.saveSettings}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Main App ── */
function App() {
  const [lang,setLang]=useState("ar");
  const [authed,setAuthed]=useState(false);
  const [role,setRole]=useState("viewer");
  const [theme,setTheme]=useState(THEMES[0]); // plum is default
  const [siteSettings,setSiteSettings]=useState({name:"HubSpot Filters", subtitle:""});
  const [filters,setFilters]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState("");
  const [selCat,setSelCat]=useState("all");
  const [formFilter,setFormFilter]=useState(null);
  const [stepsFilter,setStepsFilter]=useState(null);
  const [deleteFilter,setDeleteFilter]=useState(null);
  const [settingsOpen,setSettingsOpen]=useState(false);
  const [notif,setNotif]=useState(null);
  const timer=useRef(null);
  const t=T[lang];
  const isEditor = role === "editor";

  const showNotif=(type,message)=>{setNotif({type,message});clearTimeout(timer.current);timer.current=setTimeout(()=>setNotif(null),4000);};

  // Update CSS variables whenever theme changes
  useEffect(()=>{
    document.documentElement.style.setProperty('--clr', theme.primary);
    document.documentElement.style.setProperty('--clr-dark', theme.dark);
    document.documentElement.style.setProperty('--clr-light', theme.light);
    document.documentElement.style.setProperty('--clr-ring', theme.ring);
    document.documentElement.style.setProperty('--clr-gradient', theme.gradient);
  },[theme]);

  useEffect(()=>{
    if(sessionStorage.getItem(AUTH_KEY)==="1") {
      setAuthed(true);
      setRole(sessionStorage.getItem(ROLE_KEY)||"viewer");
    }
    try {
      const raw=localStorage.getItem(STORAGE_KEY); const data=raw?JSON.parse(raw):null; setFilters(Array.isArray(data)&&data.length?data:SAMPLES);
      const savedThemeId = localStorage.getItem(THEME_KEY);
      if(savedThemeId) { const th=THEMES.find(t=>t.id===savedThemeId); if(th) setTheme(th); }
      const savedSite = localStorage.getItem(SITE_KEY);
      if(savedSite) setSiteSettings(JSON.parse(savedSite));
    } catch { setFilters(SAMPLES); }
    setLoading(false);
  },[]);

  const handleLogin=(r)=>{ setAuthed(true); setRole(r); sessionStorage.setItem(AUTH_KEY,"1"); sessionStorage.setItem(ROLE_KEY,r); };
  const save=list=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify(list));}catch{}};

  const handleSave = (f) => {
    const isEdit = filters.some(x=>x.id===f.id);
    const updated = isEdit ? filters.map(x=>x.id===f.id?f:x) : [f,...filters];
    setFilters(updated); save(updated);
    showNotif("success", isEdit ? t.updated : t.published);
  };

  const handleDelete = (filter) => {
    const updated = filters.filter(f=>f.id!==filter.id);
    setFilters(updated); save(updated);
    setDeleteFilter(null);
    showNotif("success", t.deleted);
  };

  const copyToClipboard=text=>{
    navigator.clipboard?.writeText(text).then(()=>showNotif("success",t.copied)).catch(()=>{
      const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);showNotif("success",t.copied);
    });
  };

  const filtered=filters.filter(f=>{
    const q=search.toLowerCase();
    const matchSearch = f.title?.toLowerCase().includes(q)||f.description?.toLowerCase().includes(q);
    const matchCat = selCat==="all" || f.category===selCat;
    return matchSearch && matchCat;
  });

  if(!authed) return <LoginScreen onLogin={handleLogin} lang={lang} setLang={setLang}/>;

  const siteName = siteSettings.name || t.appName;
  const siteSubtitle = siteSettings.subtitle || t.subtitle;

  return (
    <div className="min-h-screen bg-slate-50 text-slate-800 pb-16" dir={t.dir}>
      <Toast n={notif} onClose={()=>setNotif(null)}/>

      <header style={{background: theme.gradient}} className="header-shimmer text-white shadow-lg relative overflow-hidden">
        <div className="absolute inset-0 opacity-10" style={{backgroundImage:"radial-gradient(#fff 1px,transparent 1px)",backgroundSize:"16px 16px"}}></div>
        <div className="max-w-7xl mx-auto px-4 py-8 sm:py-12 relative z-10">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
              <div className="flex items-center gap-2 mb-2 flex-wrap">
                <span className="inline-block bg-white/20 text-white text-xs px-3 py-1 rounded-full font-mono backdrop-blur-sm">{t.badge}</span>
                <button onClick={()=>setLang(lang==="ar"?"en":"ar")} className="bg-white/20 hover:bg-white/30 text-white text-xs font-bold px-3 py-1 rounded-full backdrop-blur-sm transition">🌐 {t.switchLang}</button>
                {isEditor && (
                  <button onClick={()=>setSettingsOpen(true)} className="bg-white/20 hover:bg-white/30 text-white text-xs font-bold px-3 py-1 rounded-full backdrop-blur-sm transition">{t.settingsBtn}</button>
                )}
              </div>
              <h1 className="text-3xl sm:text-4xl font-extrabold tracking-tight">{siteName}</h1>
              <p className="mt-2 text-white/80 max-w-2xl text-sm sm:text-base">{siteSubtitle}</p>
            </div>
            {isEditor && (
              <button onClick={()=>setFormFilter(false)} className="bg-white font-bold px-6 py-3.5 rounded-xl transition shadow-md hover:shadow-lg flex items-center gap-2 text-sm whitespace-nowrap" style={{color:theme.primary}}>
                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
                {t.addBtn}
              </button>
            )}
          </div>
          <div className="mt-8">
            <div className="bg-white/10 backdrop-blur-sm rounded-xl p-4 text-center inline-block min-w-32">
              <div className="text-3xl font-extrabold">{filters.length}</div>
              <div className="text-white/70 text-sm mt-1">{t.totalFilters}</div>
            </div>
          </div>
        </div>
      </header>

      <div className="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
        <div className="max-w-7xl mx-auto px-4 pt-4 pb-0">
          {/* Search input */}
          <div className="relative mb-3">
            <svg className={`absolute ${t.dir==="rtl"?"right-3":"left-3"} top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input type="text" placeholder={t.searchPlaceholder} value={search} onChange={e=>setSearch(e.target.value)}
              className={`w-full ${t.dir==="rtl"?"pr-10 pl-4":"pl-10 pr-4"} py-2.5 border border-slate-200 rounded-xl text-sm ring-theme focus:outline-none`}/>
          </div>
          {/* Category tabs */}
          <div className="flex gap-1 overflow-x-auto pb-0" style={{scrollbarWidth:"none"}}>
            {CATEGORIES.map(c=>(
              <button key={c.id} onClick={()=>setSelCat(c.id)}
                className="relative whitespace-nowrap px-4 py-2.5 text-sm font-bold transition-colors flex-shrink-0"
                style={{
                  color: selCat===c.id ? "var(--clr)" : "#64748b",
                  borderBottom: selCat===c.id ? "2px solid var(--clr)" : "2px solid transparent",
                }}>
                {t.lang==="ar" ? c.ar : c.en}
                {c.id!=="all" && (
                  <span className="mr-1 ml-1 text-[10px] font-bold px-1.5 py-0.5 rounded-full" style={{background: selCat===c.id?"var(--clr-light)":"#f1f5f9", color: selCat===c.id?"var(--clr)":"#94a3b8"}}>
                    {filters.filter(f=>f.category===c.id).length}
                  </span>
                )}
              </button>
            ))}
          </div>
        </div>
      </div>

      <main className="max-w-7xl mx-auto px-4 py-8">
        {loading ? (
          <div className="flex flex-col items-center justify-center py-24 text-slate-500">
            <svg className="animate-spin h-10 w-10 text-theme mb-4" viewBox="0 0 24 24" fill="none">
              <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
              <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
            <p className="text-sm font-semibold">{t.loading}</p>
          </div>
        ) : filtered.length===0 ? (
          <div className="bg-white rounded-2xl p-12 text-center border border-slate-100 shadow-sm">
            <div className="text-4xl mb-4">🔍</div>
            <h3 className="text-lg font-bold text-slate-700 mb-1">{t.noResults}</h3>
            <p className="text-slate-400 text-sm">{t.noResultsSub}</p>
          </div>
        ) : (
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {filtered.map(f=>(
              <FilterCard key={f.id} filter={f} onCopy={copyToClipboard}
                onViewSteps={setStepsFilter}
                onEdit={isEditor ? (f=>setFormFilter(f)) : null}
                onDelete={isEditor ? setDeleteFilter : null}
                t={t}/>
            ))}
          </div>
        )}
      </main>

      {formFilter !== null && (
        <FilterForm onClose={()=>setFormFilter(null)} onSave={handleSave} showNotif={showNotif} t={t}
          existingFilter={formFilter === false ? null : formFilter}/>
      )}
      {stepsFilter && <StepsModal filter={stepsFilter} onClose={()=>setStepsFilter(null)} t={t}/>}
      {deleteFilter && <DeleteConfirm filter={deleteFilter} onConfirm={()=>handleDelete(deleteFilter)} onCancel={()=>setDeleteFilter(null)} t={t}/>}
      {settingsOpen && <SettingsModal onClose={()=>setSettingsOpen(false)} theme={theme} setTheme={setTheme} siteSettings={siteSettings} setSiteSettings={setSiteSettings} showNotif={showNotif} t={t}/>}

      <footer className="text-center py-10 text-xs text-slate-400 border-t border-slate-200 bg-white mt-8">
        <p className="font-semibold text-slate-600 mb-1">{t.footerTitle}</p>
        <p>{t.footerSub}</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
